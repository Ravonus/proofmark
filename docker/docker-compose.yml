version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: web3sign
      POSTGRES_PASSWORD: web3sign_dev
      POSTGRES_DB: web3sign
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web3sign"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rust-engine:
    build: ../rust-service
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      BIND_ADDR: "0.0.0.0:9090"
      PDF_UPLOAD_MAX_MB: "${PDF_UPLOAD_MAX_MB:-10}"
      RUST_LOG: "proofmark_engine=info"
      WORKERS: "4"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      # Compose uses `.env` for interpolation only; runtime vars still need to
      # be forwarded explicitly to the container.
      DATABASE_URL: "${DATABASE_URL:-postgresql://web3sign:web3sign_dev@db:5432/web3sign}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3100}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-}"
      PDF_UPLOAD_MAX_MB: "${PDF_UPLOAD_MAX_MB:-10}"
      PROOFMARK_DEPLOYMENT_MODE: "${PROOFMARK_DEPLOYMENT_MODE:-oss}"
      RUST_ENGINE_URL: "${RUST_ENGINE_URL:-http://rust-engine:9090}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-noreply@proofmark.local}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      OWNER_ADDRESS: "${OWNER_ADDRESS:-}"
      OWNER_CHAIN: "${OWNER_CHAIN:-ETH}"
      AUTOMATION_SECRET: "${AUTOMATION_SECRET:-}"
      ENCRYPTION_MASTER_KEY: "${ENCRYPTION_MASTER_KEY:-}"
      AUTH_GOOGLE_CLIENT_ID: "${AUTH_GOOGLE_CLIENT_ID:-}"
      AUTH_GOOGLE_CLIENT_SECRET: "${AUTH_GOOGLE_CLIENT_SECRET:-}"
      AUTH_GITHUB_CLIENT_ID: "${AUTH_GITHUB_CLIENT_ID:-}"
      AUTH_GITHUB_CLIENT_SECRET: "${AUTH_GITHUB_CLIENT_SECRET:-}"
      AUTH_DISCORD_CLIENT_ID: "${AUTH_DISCORD_CLIENT_ID:-}"
      AUTH_DISCORD_CLIENT_SECRET: "${AUTH_DISCORD_CLIENT_SECRET:-}"
      AUTH_X_CLIENT_ID: "${AUTH_X_CLIENT_ID:-}"
      AUTH_X_CLIENT_SECRET: "${AUTH_X_CLIENT_SECRET:-}"
      AUTH_MICROSOFT_CLIENT_ID: "${AUTH_MICROSOFT_CLIENT_ID:-}"
      AUTH_MICROSOFT_CLIENT_SECRET: "${AUTH_MICROSOFT_CLIENT_SECRET:-}"
      AUTH_OKTA_CLIENT_ID: "${AUTH_OKTA_CLIENT_ID:-}"
      AUTH_OKTA_CLIENT_SECRET: "${AUTH_OKTA_CLIENT_SECRET:-}"
      AUTH_OKTA_ISSUER: "${AUTH_OKTA_ISSUER:-}"
    depends_on:
      - db
      - rust-engine

volumes:
  pgdata:
